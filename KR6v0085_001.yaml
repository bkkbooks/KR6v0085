body:
  text: 方廣錩方按前些年在寧夏某地一西夏方塔中出土一批西夏時期的文物其中包括一批佛教典籍雖然殘破較甚但仍然為我們提供了關於西夏佛教乃至中國古代書籍裝幀史的重要資料約年筆者受寧夏文物考古研究所牛達生先生之委託對這批文獻進行了初步的整理現將大致情況介紹如下以供有關研究人員的參考一圓覺道場禮懺一本寫本卷軸裝首存尾殘現存一紙行長約釐米寬約釐米共斷為等個殘片簡況如下約釐米釐米共行為原文獻之上半部分通卷下部殘缺約釐米釐米存行可綴接於殘片之首部約釐米釐米存行目前尚無法綴接約釐米釐米存行目前尚無法綴接約釐米釐米存殘字痕目前尚無法綴接約釐米釐米存行可綴接於殘片之中部約釐米釐米存行可綴接於殘片之尾部本文獻有首題作圓覺道場禮懺一本現録文如下録文時一律按照現有行款並標著殘片號與行號即下附的文字表示這些文字見於殘片之第一行下附的文字表示這些文字見於殘片之第二行如本録文之行作阿彌陀佛處同前云云南無遍十方界盡虛則表示阿彌陀佛處同前云云在殘片的第行而南無遍十方界盡虛在殘片的第行這兩行恰可綴接録文中的表示殘字每為一字為所殘字數不清中為録文者據內容或殘存字形擬補的字表示所擬補字尚無把握僅供參考標點為録文者所加表示該字尚無法辨認原文中有一些行間夾注的雙行小字以表示省略説明等意為方便起見録文時一概録為單行大字本敘録以下録文凡有特別交待者外均按照上述體例進行不再一一説明録文圓覺道場禮懺一本南無大慈大悲大神通大光藏現淨土以應圓機我毗盧遮那處云云我今稽首禮願法中下皆列此云云南無大方廣藏於諸衆生覺地諸佛處同前南無身礙同説圓覺經者百千恆河沙諸佛處同前云云南無具大悲誓願盡未來守護圓覺經者諸佛處同南無東方滿月世界十二上願藥師琉璃光佛處同前云云南無西方極樂世界四十八上願阿彌陀佛處同前云云南無遍十方界盡虛空界微塵剎土三世長智內廣大智願主不可説佛剎微塵數一切諸佛處大慈大悲娑婆世界隨機赴億影像色身我本師釋迦牟尼如幻智惠出谷向言教救標夢想苦入法性此八拜先了同前云云南無十牟尼佛哀愍覆護長此世及後身及不捨常想標受願普共諸衆録文完中國佛教懺法始於晉代漸盛於南北朝至隋唐極為流行流行的懺法種類極多大抵依憑經典嚴供五悔即懺悔勸請隨喜回向發願等各宗派依憑經典不同懺法亦有差異圓覺道場禮懺法為華嚴宗所創設的懺法主要依據唐宗密所撰之圓覺經道場修證儀十八卷該本篇幅較大稱為廣本後宋淨源略為圓覺經道場略本修證儀一卷稱為略本此兩本現均存此外根據高麗義天海東有本見行録宗密還著有圓覺經禮懺略本四卷圓覺經道場六時禮一卷前此人們知道華嚴宗在遼代極為盛行是最主要的佛教派別之一本文獻則證明華嚴宗在西夏亦較為盛行故亦流行該圓覺懺法嘉興續藏經中有華嚴經海印道場九會諸佛儀乃西夏一行法師所撰後宋普瑞補注與本文獻俱為華嚴宗在西夏盛行的依據本文獻與前述諸種關於圓覺經禮懺的關係待考本文獻有行間夾注殘片的第行有一個表示分段的形從這些行間夾注看本文獻實際是某圓覺道場禮懺法的略抄本由於當時這種禮懺已經形成一定的規範為人們熟練運用所以本文獻可以用云云下皆例此云云同前云云等語表示對一些程式化的內容的省略這也説明這種禮懺在當時流傳的廣度與深度二異本救諸衆生一切苦難經擬寫本卷軸裝首尾均殘通卷殘損嚴重僅存該文獻上半部分之若干文字現存紙行第一紙長釐米第二紙長釐米總長約釐米最寬處釐米現録文如下録文中的表示對所録之字尚無把握僅供參考中的字為對原件錯字的正誤行號為録文時所加其他體例同前從照片看也可能行以前為一紙為該文獻之上半部分行起為另一紙為該文獻之下半部分但兩部分似不能綴接這個問題尚須考察原件後仔細研究録文大惡人有福利無化天身之寫六親鄉村正月一日雷電碩大有此經寫此經得除難消災寺七十二宮寅鬼神等共受其苦免災欲救苦衆無偽毀傍謗之自然分殷勤薩聞佛所説踴躍心中快卷經香無人行有地無人耕亂黃行分明寫此經日去朝寫此經三本免免一家留録文完本文獻雖殘損嚴重但從現存的內容可以判定為是與救諸衆生一切苦難經新菩薩經勸善經等同類的民間傳帖故擬名作異本救諸衆生一切苦難經此類傳帖在敦煌遺書中保存較多從現有資料看早在東晉南北朝時間這類傳帖已經出現可參見敦煌研究院藏佛圖澄所化經大慈如來告疏晚唐貞元年間這類傳帖曾在西北地區大規模流行可參見至今保存在敦煌遺書中的大量同類文獻本文獻則證明直到西夏時期這類傳帖仍在民間流傳這類傳帖是在佛教災變思想的影響下出現的但其本身更多地體現了中國民間的種種迷信習俗可視為中國民間宗教的先聲關於這類傳帖的研究可參見拙作吐魯番出土漢文佛典述略載西域研究年第一期修訂後收入敦煌學佛教學論叢香港中國佛教文化出版有限公司出版年月圓空新菩薩經勸善經救諸衆生一切苦難經校録及其流傳背景之探討載敦煌研究年第一期王惠民北魏佛教傳帖原件大慈如來告疏研究載敦煌研究年第一期邰惠莉敦煌寫本佛圖澄所化經初探載敦煌研究年第四期三大方廣圓覺修多羅了義經略疏卷下刻本蝶裝經文為陰文四周圍以陰文界欄疏文為陽文無界欄每紙兩個半葉每半葉行因下殘行字不清從殘狀及疏文看應為字左右四邊有邊框左右為子母框天地為單線框版心單框無魚尾署書名作略疏下書名上下單框本文獻原名殘今考訂為唐宗密撰大方廣圓覺修多羅了義經略疏卷下現散落為十六紙其中等紙個半葉上部大體完整下部殘損版心之下部殘損尤甚均為一個半葉原係同紙為右半葉之下部且殘存有該紙版心之下部可見單框及三應為該紙之版片號為左半葉之上部為小殘片諸紙概況如下釐米釐米行含版心存文相當於大正藏第卷第頁中欄第行同頁下欄第行版心部分有柳信忠一片一行五字係該版施刻人姓名由此可知本文獻乃募集衆資鐫刻而成釐米釐米行含版心存文相當於大正藏第卷第頁下欄第行同欄第行首部文字與之結尾部分應可連綴釐米釐米行含版心存文相當於大正藏第卷第頁下欄第行第頁上欄第行首部文字與之結尾部分應可連綴釐米釐米行含版心存文相當於大正藏第卷第頁上欄第行同欄第行首部文字與之結尾部分應可連綴釐米釐米行含版心存文相當於大正藏第卷第頁上欄第行同頁中欄第行首部文字與之結尾部分應可連綴釐米釐米行含版心存文相當於大正藏第卷第頁中欄第行同欄第行首部文字與之結尾部分應可連綴釐米釐米行含版心存文相當於大正藏第卷第頁下欄第行第頁上欄第行首部文字與結尾部分不能連綴中間缺失紙個半葉釐米釐米行含版心存文相當於大正藏第卷第頁上欄第行同欄第行首部文字與之結尾部分應可連綴釐米釐米行僅有輪兩字係陰文為圓覺經經文正文可參見大正藏第卷第頁上欄第行這一小殘片實際位置應在殘片右葉第行之下中間尚殘欲故二字不能直接綴接經文原作從無始際由有種種恩愛貪欲故有輪回釐米釐米行僅三唱仿復始五字前三字為陽文係疏文後兩字為陰文係圓覺經正文可參見大正藏第卷第頁下欄第行同欄第行這一小殘片實際位置應在殘片第兩行之上疏文原作是無上義下三唱仿前經文原作如是三請終而復始釐米釐米行半可見義下兩字陽文係疏文可參見大正藏第卷第頁下欄第行這一小殘片實際位置應在殘片第兩行之首可綴接在殘片之上亦即疏文是無上義下三唱仿前之義下兩字釐米釐米行僅等或兩字為陽文係疏文具體位置待考釐米釐米行含版心版心中間有版片號二存文可參見大正藏第卷第頁下欄第行同欄第行從存文可判定它與殘片原為一紙位置應在殘片第行至第行下面但中間尚有殘缺現兩殘片無法直接綴接等三塊均為無文字小殘片圓覺經為華嚴宗的重要典籍也為禪宗僧人所重視它的流行與宗密的提倡有很大的關係宗密著有圓覺經大疏圓覺經大疏鈔圓覺經略疏圓覺經略疏鈔圓覺經大疏科等多種著作宣揚圓覺經義成為研究圓覺經的重要著作西夏流行該文獻應視為華嚴宗在西夏廣泛流傳的一個組成部分本文獻之經文與疏文分別用陰文陽文鐫刻在早期刻本中較為罕見是研究我國版刻史的珍貴實物資料四佛頂心陀羅尼經刻本經折裝上下單邊每半葉約行每行約字因殘爛每紙行數不清且通卷下部殘爛現存殘片個編為號諸殘片簡況如下釐米釐米共行殘留上邊及上欄下部殘缺釐米釐米共行殘留上邊幾上欄下部殘缺釐米釐米共行殘留上邊及上欄下部殘缺其中第行與第行之間有版片號三第行為經名作佛頂心觀世音經卷中釐米釐米共行為所存最大的一個殘片由兩紙粘接而成粘接處在第行與第行之間釐米釐米僅兩行為一小殘片釐米釐米僅兩行為一小殘片釐米釐米僅兩行為一小殘片釐米釐米僅行為一殘片第行與第行之間有版片號二釐米釐米共行為一長條殘片係殘卷之下部釐米釐米僅行為一小殘片釐米釐米僅行為一小殘片釐米釐米僅行為一小殘片釐米釐米僅行為一小殘片釐米釐米僅行為一小殘片係殘卷之下部本文獻首尾題殘但殘片中殘留經題佛頂心觀世音經卷中該經乃中國人所撰疑偽經三卷不為我國歷代大藏經所收但在房山石經中保存有兩個刻本甲本刻石四條編號依次為塔下號塔下號塔下號與塔下號乙本刻石四條編號依次為塔下號塔下號塔下號塔下號在民間也有經本流傳且有相應的繪圖本傳世本文獻名稱較多根據房山石經卷上的首尾題分別作佛頂心觀世音菩薩大陀羅尼經與佛頂心觀世音經卷中的首尾題分別作佛頂心觀世音菩薩療病催産方與佛頂心觀世音經卷下的首尾題分別作佛頂心觀世音菩薩救難神驗與佛頂心陀羅尼經上述經題與西夏本殘存經題相符仔細考察諸卷首題實際僅僅是依據該卷內容所取的名稱並非該經的總稱考慮到經文內容主要敘述觀世音所述該陀羅尼的殊勝功德且文中多處出現此佛頂心陀羅尼經的提法則該經的名稱應以卷下尾題之佛頂心陀羅尼經為正因西夏本殘缺較甚現參照房山石經甲本乙本參見中國佛教圖書文物館出版的房山石經遼金刻經俊寧册録校纂為整理本録校時凡屬西夏本現存的文字一律按照西夏本現有行款録校並標著殘片號與行款號如表示該文字見於西夏本殘片之第一行凡屬西夏本已不存的文字一律按照房山石經甲本為底本以乙本為校本録校以標示之這些西夏本已不存的文字凡可據西夏本擬定其行款者按擬定的行款録校而號以前的文字因西夏本全殘已無法按照西夏本擬訂其行款故依據房山石經甲本的行款録校為避文繁凡可綴接之諸殘片一律在録校本中以殘片號與行款號表示之如自在王陀羅尼經印若書寫讀誦睹視者彼人所有一切煩惱閉障運為不遂或錢財耗散口舌競生若宅舍不安或五路閉塞多饒怪夢疾病纏身無所依怙但能於晨朝時生尊重心供養誦此陀羅尼者常即表示殘片之第至第行可與殘片之第至第行相綴接綴接後下部文字仍不具足所缺文字根據房山石經本補足用括示録文佛頂心觀世音菩薩大陀羅尼經卷上爾時觀世音菩薩而白釋迦牟尼佛言是我前身不可思議福德因緣欲令利益一切衆生起大悲心能斷一切繫縛能滅一切怖畏一切衆生蒙此威神悉能離苦解脫爾時觀世音菩薩重白釋迦牟尼佛言我今欲為苦惱衆生説消除災厄臨難救苦衆生無礙自在王智印大陀羅尼法以用救拔一切受苦衆生除一切疾病滅除惡業重罪成就一切諸善種智速能滿足一切心願利益安樂一切衆生煩惱障閉唯願慈悲哀愍聽許爾時釋迦牟尼佛言汝大慈悲宜應速説時觀世音菩薩從法座起合掌正立即説姥陀羅尼咒曰那謨喝囉二合怛那怛囉夜耶那謨阿唎耶婆路咭帝攝伐囉耶菩提薩埵跛耶摩訶薩埵跛耶摩訶迦嚧呢迦耶怛侄他阿鈸陀阿鉢陀跋唎跋帝湮醘夷跢醘侄他薩婆陀羅尼曼荼囉耶湮醘夷醘鉢囉磨輸馱菩跢耶唵薩婆斫芻伽耶陀羅尼因地唎耶怛侄他婆嚧枳帝攝伐囉耶薩婆咄瑟吒烏訶耶彌薩婆訶爾時觀世音菩薩説此陀羅尼已十方世界皆大震動天雨寶花繽紛亂下為供養此陀羅尼名薄伽梵蓮華手自在心王印若有善男子善女人得聞此祕密神妙章句一歷耳根身中所有百千萬罪悉皆消滅此陀羅尼能滅十惡五逆誹謗闡提非法説法或於三寶師主父母前起驕慢心或世世造業殺生害命或三朝滿月嫁女婚男橫殺衆生犯無邊大罪在於己身終日冥冥不知不覺天不容地不載千佛出世不通懺悔處者如是之人捨此一報身當墮落阿鼻無間地獄中受其苦楚一日一夜萬死萬生經八萬大劫受罪永無出期若有慈順男子女人欲報父母深恩者遇見此佛頂心陀羅尼經文字章句能請人書寫受持讀誦每日於晨朝時向佛前燒香誦念此陀羅尼經如是之人終不墮於地獄中受罪乃至到百年命盡臨欲終時心不散亂見十方聖衆菩薩各持花臺幡蓋猶如日輪霞光滿室來迎是人往生淨國諸大菩薩舒金色手摩頂授記口稱善哉善哉善男子善女人生我國中護如眼睛愛惜不已此陀羅尼功德無量何況有人聞見書寫受持供養其福不可稱量若復有一切女人厭女人身欲得成男子身者至到百年捨命之時要往生西方淨土蓮花化生者須當請人書寫此陀羅尼經安於佛前以好花香日以供養不闕者必得轉於女身成男子至百歲命終猶如壯士屈伸臂頃如一念中間即得往生西方極樂世界坐寶蓮花時有百千婇女常隨娛不離其側又設復有善男子善女人若得見聞此佛頂心自在王陀羅尼經印若書寫讀誦睹視者彼人所有一切煩惱閉障運為不遂或錢財耗散口舌競生若宅舍不安或五路閉塞多饒怪夢疾病纏身無所依怙但能於晨朝時生尊重心供養誦此陀羅尼者常為觀世音菩薩無邊大神力金剛密迹隨逐日夜宿衛是人所思念事皆得依願圓滿成就又若有善男子善女人求一切願者欲成就一切種智當獨坐靜處閉目心念觀世音菩薩更勿異緣誦此陀羅尼經一七遍無願不果又得一切人之所愛樂不墮一切諸惡之趣是人若住若臥當能見佛如對目前無量俱胝之所積集諸惡過罪悉能消滅如是之人當得具足轉輪王之福若人掬香花供養此陀羅尼經者是人得大千之福大悲法性彼人世間得大成就又若有善男子善女人能於晨朝時面向佛前燒香誦此陀羅尼經若滿千遍即時見觀世音菩薩當化現阿難形相為作證明問言所須何果報悉能依願成就消除身口意業得佛三昧灌頂智力波羅蜜地殊勝之力如滿果遂佛頂心觀世音經卷上佛頂心觀世音菩薩療病催産方卷中又設復若有一切諸女人或身懷六甲至十月滿足坐草之時忽分解不得被諸惡鬼神為作障難令此女人苦痛叫喚悶絶號哭無處投告者即以好朱砂書此陀羅尼及祕字印密用香水吞之當時分解産下智慧之男有相之女使人愛樂又若復胎衣不下致損胎傷殺不然兒為母死乃至母為兒亡或復母子俱喪速以朱砂書此頂輪王祕字印用香水吞之當即便推下亡兒可以速棄向水中若懷妊婦人不得吃狗肉鱔魚鳥雀物命之類即日須常念寶月智嚴光音自在王佛又若復有善男子善女人或身遭重病經年纍月在於床枕以名藥治之不差者可以朱砂書此陀羅尼及祕字印向佛前用茅香水吞之其病當即除差若諸善男子善女人卒患心痛不可申説者又以朱砂書此陀羅尼及祕字印用青木香及好茱萸煎湯相和吞之一切疾患無不除差又諸善男子善女人若至父母兄弟親眷到臨命終時悽惶之次速取西方一掬淨土書此陀羅尼燒作灰以和其淨土作泥置於此人心頭上可以著衣裳蓋覆如是之人於一念中間承此陀羅尼威力便生西方極樂世界面見阿彌陀佛不住中陰之身四十九日此陀羅尼若人貧困飢渴復思衣念食無人救接者但能至心供養日以香花冥心啓告念佛必得財帛衣食悉能滿足又若復有人得遇善知識故誘勸書此陀羅尼經上中下三卷準大藏經中具述此功德如人造十二藏大尊經也將紫磨黃金鑄成佛像供養此陀羅尼威神之力亦復如是又諸善男子善女人或東鄰西舍有飛符注殺破射雄雌魍魎鬼神橫相惱亂在人家宅中伺求人便者若遇得此陀羅尼經於所在供養者是諸鬼神悉能奔走不敢侵害佛頂心觀世音經卷中佛頂心觀世音菩薩救難神驗卷下昔罽賓陀國中有疾病時疾流行遍一國中是人得病者不過一日二日並已死盡觀世音菩薩便化作一白衣居士起大悲心巡門廣為治療持此法印令速請人書寫此陀羅尼經三卷盡心供養應時消散當即出離外國故知書寫供養不可窮述又昔波羅奈國中有一長者家中大富財帛無量唯只有一男壽年十五忽爾得病百藥求醫不差命在須臾悽惶不已時有一鄰並長者來至宅中問言長者何為不樂長者遂具説向因緣時長者聞説答言長者但不至愁惱唯有請人於家中以素帛書此佛頂心陀羅尼經三卷面向佛前燒香轉念可得其子疾病退散壽命延長於時長者一依所言便即請人於家中抄寫未了其子疾病當下除差感得閻羅王差一鬼使報言長者此子命限只得十六歲今已十五唯有一年今遇善知識故勸令書寫此陀羅尼經得延至九十故來相報是時長者夫妻歡喜踴躍無量即開倉庫珠金並賣更寫一千卷日以供養不闕當知此經不可稱量具大神驗又昔曾有一婦人常持此佛頂心陀羅尼經日以供養不闕乃於三生之前曾置毒藥殺害他命此怨家不曾離於前後欲求方便致殺其母遂以托陰此身向母胎中抱母心肝令慈母至生産之時分解不得萬死萬生及至生産下來端正如法不過兩歲便即身亡母憶之苦痛痛切號哭遂即抱此孩兒拋棄向水中如是三遍托陰此身向母腹中欲求方便致煞其母至第三遍準前得生向母胎中百千計校抱母心肝令其母千生萬死悶絶叫喚準前生下特地端嚴相貌具足亦不過兩歲又以身亡母既見之不覺放聲大哭是何惡業因緣準前抱此孩兒直至江邊直經數時不忍拋棄感觀世音菩薩遂化作一僧身披百納直至江邊乃謂此婦人曰不用啼哭此非是汝男女是弟子三生前中怨家三度托生欲殺母不得為緣弟子常持佛頂心陀羅尼經並供養不闕所故殺汝不得若欲要見汝這怨家但隨貧道手看之道了以神通力一指遂化夜叉之形向水中而立報言緣汝曹殺我來我今欲來報怨蓋緣汝有大道心常持佛頂心陀羅尼經善神日夜擁護所故煞汝不得我此時既蒙觀世音菩薩與我授記了從今永不與汝為怨道了便沈水中忽然不見此女人兩淚交流禮拜菩薩便即歸家冥心發願貨賣衣裳更請人寫一千卷倍加受持無時暫歇年至九十七歲捨命向秦國變成男子之身若有善男子善女人能寫此經三卷於佛室中以色雜綵作囊盛之乃至或隨身供養者是人若住若臥危險之處當有百千那羅延金剛密迹大力無邊阿吒鈸拘羅神身持劍輪隨逐所在作衛無難不除無災不救無邪不斷又昔有官人擬赴任懷州縣令為無錢作上官行理遂於泗州普光寺內借取常住家錢一百貫文用充上官其時寺主便以接借即差一小沙彌相逐至懷州取錢其沙彌當即便與官人一時乘船得至一深潭夜宿此官人忽生惡心便不肯謀還寺家錢令左右將一布袋盛這和尚拋放水中緣這和尚自從七歲已來隨師出家常持此佛頂心陀羅尼經兼以供養不闕自不曾離手所在處將行轉念既此官人致煞殊不損一毫毛只覺自己身被個人扶在虛空中如行暗室直至懷州縣中專待此官人到是時此官人不逾一兩日得上懷州縣令三朝參見衙退了乃忽見拋放水中者小和尚在廳中坐不覺大驚遂乃升廳同坐乃問和尚曰不審和尚有何法術此沙彌具説衣服內有佛頂心陀羅尼經三卷加被功德不可具述此官人聞語頂禮懺悔便於和尚邊請本破自己料錢喚近人只向廳前抄寫一千卷置道場內日以香花供養後敕家改任懷州刺史故知此經功德無量無邊歡喜信受頂戴奉行佛頂心陀羅尼經卷下録文完本經是我國佛教徒所撰的重要疑偽經之一故雖不為歷代大藏經所收但在民間有較大的影響一直流傳不衰是研究信仰性佛教中觀世音信仰的重要資料本經證明西夏與北宋遼國一樣都盛行觀世音信仰本經通篇用中古口語寫成對研究中古口語的語法與辭彙也有重要的參考意義西夏本雖然殘爛嚴重但仍有較大的校勘價值比如房山石經本在敘述該觀世音陀羅尼的殊勝功德時稱承此陀羅尼威力便生西方極樂世界面見阿彌陀佛不住中陰佛不住中陰之身四十九日何謂不住中陰佛語不可通西夏本則作承此陀羅尼威力便生西方極樂世界面見阿彌陀佛不住中陰之身四十九日文從字順五衆經集要擬寫本縫繢裝上下單邊有豎欄每紙兩個半葉每半葉行行約至字不等兩半葉間留有中縫縫繢裝是我國晚唐五代出現的一種書籍裝幀形式根據敦煌遺書中所存的縫繢裝實物它的裝幀方式是若干張紙一般為至張疊為一個單元對折為二這樣的一個單元類似於現代書籍的一個印張然後將若干個這樣的單元疊合起來從中縫的對折處用麻線將它們縫繢起來縫繢時採用一種復雜的繞線技巧使得各單元成為一個整體固定為有明確首尾的書册狀縫繢裝諸紙一般劃有邊框有的有豎欄由於當時的紙張較厚故敦煌遺書中的縫繢裝均為兩面抄寫這樣的縫繢裝如果散落則呈現一紙左右兩個半葉兩面抄寫同一半葉之正反兩面文字銜接如果該紙為某單元之最裏面之一紙以下稱芯紙則芯紙正面左右兩個半葉的文字可以銜接而芯紙反面左右兩個半葉的文字互不銜接如果該紙是芯紙以外的其他諸紙以下稱夾紙則夾紙每面的兩個半葉的文字均不能銜接西夏方塔出土的這批縫繢裝的釘線已經亡斷故諸葉脫落成為散張這些散張多有遺失故現存之散張文字大多不能銜接且原文獻所寫本來就不是連貫的經文而是經文摘抄這就更難確定諸散張之先後次序另外根據牛達生先生提供的復印件以及通過長途電話確認西夏方塔出土的這批縫繢裝諸紙均非雙面抄寫而僅是單面抄寫由此看來這批縫繢裝可能由下述兩種方法産生第一種先將諸薄紙兩兩相配粘為一較厚的紙以下為敘述方便將該相互搭配的兩紙稱為配紙其中面向裏面的一紙稱為裏紙面向外的一紙稱為外紙然後按照上述縫繢裝方式分為若干單元並裝訂抄寫第二種先將諸薄紙對折然後按照縫繢裝方式分為若干單元裝訂裝訂後再將諸紙兩兩相配粘貼在一起然後抄寫兩種方法的區別在於前一種是先配粘後裝訂後一種是先裝訂後配粘用前一種方法做成的縫繢裝書籍每個單元的紙數都是雙數也必須是雙數每個單元互不粘連而用後一種方法做成的縫繢裝書籍每一單元的紙數也可以是單數並可能出現不同單元的左右半葉相互粘連成為配紙的情況衆經要集究竟用上述哪種方法做成因未考察原件無從恢復原文獻之縫繢裝原貌故無法作出最後結論在此僅將諸散葉情況介紹如下存一紙釐米釐米左右兩個半葉共計行有中縫現上部完整下部殘缺右左兩半葉文字順序相接故本紙應為該縫繢裝某單元之芯紙所節抄內容為無量壽經卷上有首題已殘尚可辨認一個寶字從節抄經文內容看乃敘述西方淨土之七寶莊嚴與首題相符經文可參見大正藏第卷第頁欄第行至同欄第行與大正藏本相比文字略有錯漏存一紙釐米釐米左右兩個半葉共計行有中縫現上部完整下部殘缺左右兩半葉文字不能銜接右半葉所抄為無量壽經卷上經文可參見大正藏第卷第頁欄第行至同卷第頁欄第行首部與紙左半葉經文之末尾恰可銜接按照縫繢裝的抄寫特點可知紙與紙互為配紙其中紙為裏紙紙為外紙左半葉所抄為大阿彌陀經經文可參見大正藏第卷第頁欄第行至同欄第行按照縫繢裝的抄寫特點紙外紙左半葉尾部經文應與其相配之紙裏紙的右半葉首部經文相銜接但由於本文獻為節抄經文故紙右半葉與紙左半葉所節抄的分別為不同的經文章節兩者不能銜接存一殘片釐米釐米僅行出土和將它錯接在紙下補實際應綴接在紙右半葉之第行第行之下存一殘片釐米釐米實為某紙之左半葉存行有中縫保存相對完好所節抄為無量壽經卷下經文可參見大正藏第卷第頁欄第行至同紙欄第行經文與紙之右半葉可以銜接存一紙釐米釐米左右兩個半葉共計行有中縫保存基本完好左右兩半葉文字不能銜接右半葉所節抄為無量壽經卷下經文可參見大正藏第卷第頁欄第行至同欄第行首部經文與紙尾部經文可以銜接左半葉所節抄為無量壽經卷上經文可參見大正藏第卷第頁欄第行至同欄第行第行末尾有並無量壽經五字應為前此數段經文節抄的出處説明第行作往生觀行應為下一段經文節抄之標題從兩紙的形態可知兩紙互為配紙由於紙右半葉殘缺故現在無法判斷該兩紙是芯紙還是夾紙亦即如果紙之左右兩半葉之文字可以銜接則應為芯紙如果紙之左右兩半葉之文字不能銜接則應為夾紙存一殘片釐米釐米僅行所抄為無量壽經卷上經文可參見大正藏第卷第頁欄第行至同欄第行目前尚無法與現知之任何一紙相綴接存一殘片釐米釐米為某紙之左半葉存行有中縫中下部殘爛所節抄為觀無量壽佛經經文可參見大正藏第卷第頁欄第行至同欄第行目前尚無法與現知之任何一紙相綴接存一殘片釐米釐米為某紙之左半葉存行有中縫下部殘缺所節抄為大佛頂萬行首楞嚴經卷第五經文可參見大正藏第卷第頁欄第行至同頁欄第行目前尚無法與現知之任何一紙相綴接存一殘片釐米釐米為某紙之某半葉存行殘破較甚所節抄為阿彌陀經經文可參見大正藏第卷第頁欄第行至同卷第頁欄第行目前尚無法與現知之任何一紙相綴接存一紙釐米釐米左右兩個半葉共計行有中縫中縫下部殘缺餘基本完好左右兩半葉文字不能銜接右半葉所節抄為大乘無量壽莊嚴經自第行至第行之終不能得部分經文可參見大正藏第卷第頁欄第行至同欄第行第行彼諸衆生起至第行經文可參見同頁欄第行至第行兩段文字亦不能銜接但第行首部經文可與紙左半葉之末尾銜接左半葉所節抄為稱揚諸佛功德經卷下經文可參見大正藏第卷第頁欄第行至同欄第行尾部經文可與紙右半葉之首部經文銜接存一紙釐米釐米左右兩個半葉共計行有中縫中縫下部殘缺餘基本完好左右兩半葉文字不能銜接右半葉抄寫文字兩段前行為稱揚諸佛功德經卷下經文可參見大正藏第卷第頁欄第行至同頁欄第行首部經文可與紙左半葉尾部相銜接第行首為該段經文的出處作稱揚諸佛功德經卷下第四行下部為該半葉所寫另一段文字的出處作華嚴經第六十三第行至第行則為所寫文字這段文字與前此所抄經文有所不同不是節抄原文而是根據華嚴經卷六十三的一段經文撮略有關淨土的要點而成可參見大正藏第卷第頁欄第行至欄第行經文左半葉所節抄為大乘無量壽莊嚴經經文可參見大正藏第卷第頁欄第行至同欄第行尾部經文可與紙右半葉首部經文銜接從上述介紹可知兩紙互為配紙且屬於某一單元之夾紙故同一紙的兩個半葉的文字不能銜接而裏紙外紙對應之兩半葉所抄文字則能銜接從內容看本文獻與樂邦文類經證部屬於同一類典籍均係摘抄諸經典中關於淨土的論述編集而成故擬名作諸經集要從所抄典籍看本文獻與樂邦文類也有重復共同之處因此本文獻與樂邦文類有何關係值得研究本文獻説明淨土信仰在西夏甚為流行為我們研究西夏的佛教形態提供了重要的依據本文獻在中國書籍裝幀史上有重要價值如前所述我國晚唐五代開始出現縫繢裝大體同時出現的還有粘葉裝其後粘葉裝發展為蝶裝而縫繢裝則逐漸失傳乃至完全不為人們所知現代出版的諸種關於書史的著作中均沒有關於縫繢裝的敘述其實在北宋張邦基所撰墨莊漫録卷四中有著關於縫繢裝的著録該書稱王洙原叔內翰嘗云作書册粘葉為上久脫爛苟不逸去尋其次第足可抄録屢得逸書以此獲全若縫繢歲久斷絶即難次序初得董氏繁露數册錯亂顛倒伏讀歲餘尋繹綴次方稍完復乃縫繢之弊也嘗與宋宣獻談之公悉令家所録者作粘法豫嘗見舊三館黃本書及白本書皆作粘葉上下欄界皆界出於紙葉後在高郵借孫莘老家書亦作此法又見錢穆父所蓄亦如是多祗用白紙作褾硬黃紙作狹簽子蓋前輩多用此法豫性喜傳書他日得奇書不復作縫繢也書籍裝幀形式的變化主要取決於書籍載體的變化這是一條基本的規律此外則越來越趨向實用與美觀這也是書籍裝幀的發展規律從這個角度講縫繢裝的出現首先是由於晚唐五代我國紙張的變化當時出現一種相對比較厚的紙這種紙剪裁成小單張後仍比較挺拔舒展易於翻動這樣就為梵夾裝粘葉裝縫繢裝這類以單葉為基礎的書籍裝幀法的出現奠定了物質基礎其次也是因為傳統的卷軸裝展閲不便而梵夾裝粘葉裝縫繢裝這類以單葉為基礎的書籍展閲起來則方便多了這是晚唐五代梵夾裝粘葉裝縫繢裝這類以單葉為基礎的書籍裝幀法出現的基本原因由於當時的紙張較厚所以梵夾裝粘葉裝縫繢裝這類以單葉為基礎的書籍一般均為雙面抄寫這樣同樣數量的紙張可以容納的文獻量則增加了一倍這大概也是梵夾裝粘葉裝縫繢裝這類以單葉為基礎的書籍裝幀法受到歡迎的原因之一當時也有相對較薄的紙張不便於雙面抄寫遇到這種紙張時人們便把它們兩兩粘在一起成為一厚葉然後按照梵夾裝粘葉裝縫繢裝等書籍裝幀法裝幀再雙面抄寫敦煌遺書中有這樣的實例這也充分説明書寫載體與書籍裝幀的這種因果關係晚唐五代出現的梵夾裝粘葉裝縫繢裝等三種以單葉為基礎的書籍裝幀法其後粘葉裝發展為蝶裝成為北宋書籍的主流而梵夾裝縫繢裝等兩種裝幀法逐漸被淘汰原因何在呢關鍵有兩條首先是隨著經濟的發展用紙需求量的增長造紙原料的擴展造紙技術的發展北宋時期所造的紙張一般都比較薄這種紙張如採用梵夾裝粘葉裝縫繢裝這類書籍裝幀法裝幀就有相當的難度裝成的書籍也甚易磨損蝶裝是北宋書籍裝幀法的主流由粘葉裝發展而來當時的蝶裝實際都是將兩張薄紙粘為一葉以此克服紙薄這一缺點梵夾裝與縫繢裝當然也可以採取兩紙相粘以增厚的辦法但是這樣一則增加了書籍裝幀的難度二則正如張邦基在上述文章中提出的用縫繢裝裝幀法裝幀的書籍一旦訂線斷絶書葉散落就很難恢復其原次序這種情況在使用薄紙的情況下顯得更為嚴重比如敦煌遺書中的厚紙雙面抄寫的縫繢裝書籍一旦散落由於同一個半葉的正反兩面文字銜接釐定其次序時還較為方便北宋時期的單面抄縫繢裝書籍一旦散落則諸紙次序完全打亂要想釐定其文字先後實難措手西夏方塔此次出土的這批縫繢裝書籍就是如此我認為正是這一致命的缺點決定了這種裝幀法後代被廢棄的命運西夏出土的這批書籍是國內目前發現的唯一的薄紙雙面抄寫縫繢裝書籍為我們提供了這一書籍裝幀演變史的實際例證十分可貴梵夾裝的情況與縫繢裝大致相似所以這種梵夾法在後代也沒有能夠普遍流傳開來六三十五佛名禮懺功德文附仁宗施經願文擬刻本從照片看似為卷軸裝現存紙文字銜接其中首紙右側有陰文版片號七故知現存首紙實為該文獻的第七紙則全文獻原為九紙現前六紙已佚僅餘末尾之第七第八第九等紙第七紙下部殘爛存版片號第八紙下部殘爛版片號失第九紙上部殘爛版片號失從現存情況看該文獻每紙刊刻行行約字在此先根據照片録文録文時凡殘爛而無法辨認的字用表示每表示殘爛一字殘爛字數無法確定時用表示根據文意及殘存字痕擬補的字用表示擬補而無把握的字在其後用表示録文時按照原文獻行款標著行號録文前殘罪猶如墨悉皆清淨無餘自如秋月似若明珠內外想已然誦回施三輪體空頌諸佛正法菩薩僧直至菩提我歸依我以所作諸善根為有情故願能回施人回施善所獲一切猶如幻三輪體空如誦一遍回施既已意而住行住坐臥四南無歸依佛南無歸依法南無歸依僧若有善男子善女人夜六時或三時或具時中作此三十五佛懺無始直至今時自他喜所積十不善業五無間罪別解脫禁戒之罪觸犯菩薩禁戒之罪觸犯祕密記句罪等一切過罪悉得消滅及所觸犯記句禁戒復得完全天龍八部一切護法善神等常隨擁護一神不能侵害一切於現世中無病延年事口舌厭禱咒詛一切災難所有違情不祥等事即得除遣國泰民安風雨依時五穀豐熟花果茂盛永無疫癘一切疾病不遭橫一切時中常得安樂所祈願充足臨終之時無諸痛苦念三十五佛而為上首極微塵數上師本尊來接引隨意往生聞法即得攝受功德悉得圓滿速證無上正等正覺也依三十五佛晝夜時重罪齊門朕謂剖裂宗風方究空廓徹心境始分理性之玄相好之莊嚴罔啓修為憑聖象得契玄詮故我覺皇應身法界玉毫耀於幽顯金色粲於人天或成道此方示救於他國或住壽一劫廣演教於祗賢劫以題名歷星宿而莫小數無窮業障念菩提樹而尊像有法印各別是皆宣比潛知勤跪誦以成能殄災而植福若有菩薩犯波羅夷頓起妄毀僧殘戒為造五無間之大罪又作十不善業之或墮地獄畜生餓鬼惡趣邊蔑戾車六根不具如此等罪皆能懺悔為苦海之舟航實群生之怙恃也故貝書翻譯而法苑盛傳近遇名師重加刊正增釋文之潤色煥佛日之光華謹鏤板以流行俾讚揚而禮懺以茲鴻祐申願深衷仰祝祈藝祖神宗俱遊極樂次祝考皇早證上乘中宮儲富則保榮昌率土普天而同躋富壽遍斯花藏之無際逮此剎種之含靈悉悟真如同登勝果謹願時大夏乾祐庚子十一年五月初奉天顯道耀武宣文神謀睿智制義去邪惇睦懿恭皇帝謹施録文完從卷尾題記可知本文獻為西夏乾祐十一年年五月仁宗施刊的禮懺功德文及刊施願文仁宗是西夏的第五代皇帝執政達年在他統治的時期中西夏佛教得到較大的發展佛典刊印較為普遍仁宗本人虔信佛教曾多次刊施佛經根據史金波西夏佛教史略寧夏人民出版社年月仁宗本人曾經在天盛十九年年刊施過佛説聖佛母般若波羅密多心經乾祐十五年年刊施過佛説聖大乘三歸依經與聖大乘勝意菩薩經乾祐二十年年刊施觀彌勒菩薩上生兜率天經等此外散施佛教典籍如金剛經普賢行願經觀音經等數以萬計仁宗還親自參與經典的翻譯擔任詳定現存西夏佛典中由仁宗詳定的經典就有數種史金波先生認為可以推想仁宗一朝由於皇帝皇后和大臣的倡導使刊刻散施漢文佛經達到全盛時期同上書第頁本文獻的發現為上書推論提供了新的資料與佐證本文獻現存前行為禮懺功德文第行至第行為仁宗刊施願文由於前殘禮懺功德文全文不詳從所存文字看所禮懺者應為三十五佛名禮懺文按照大寶積經優波離會及決定毗尼經觀藥王藥上兩菩薩經觀虛空藏菩薩經等經典的説法以釋迦牟尼為首的三十五佛常住於一切世界衆生如能對三十五佛禮敬懺悔可以滅除一切業障過罪唐不空譯有佛説三十五佛名禮懺文亦為此住世三十五佛但佛名與大寶積經等所載有參差該佛説三十五佛名禮懺文現載大正藏第十二卷其譯經記稱右此三十五佛名並懺悔法出烏波離問經能淨業障重罪現生所求禪定解脫及諸地位皆能滿足五天竺國修行大乘人常於六時禮懺不闕功德廣多文煩不能盡録云云本文獻第行到第行所述禮懺功德與不空譯佛説三十五佛名禮懺文所述禮懺功德文字雷同且不空譯佛説三十五佛名禮懺文篇幅不大不足千字由此可知本文獻原文應分為三部分首先是不空譯佛説三十五佛名禮懺文其次是禮懺功德文最後是仁宗的刊施願文故擬作此名唐代以來三十五佛名禮懺在我國較為流行敦煌出土的中國人所撰七階佛名經中也有三十五佛名禮懺的內容但已與其他懺法揉為一體根據俄國孟列夫先生所撰目録黑城出土的西夏漢文佛典中既有佛説三十五佛名經數號又有與本文獻完全相同的文獻殘片加上寧夏方塔本文獻的發現説明三十五佛名禮懺法雖然已經與其他懺法揉為一體但本身仍以獨立的形態繼續流傳起碼在西夏地區是如此這反映了西夏佛教的宗教踐修的一個側面如上所述本文獻在黑城出土西夏文獻中亦有發現現藏俄國編號為號孟列夫編號作號著録如下此經指佛説三十五佛名經方按的一個不著名刊本的序言談到了誦讀此經的好處木刻本的折面釐米欄面釐米單欄經文的一部分首尾殘缺行行字宋體字紙色淺黃灰澀滯厚毫米每釐米道簾紋無書題根據開本和樣式看像年的御覽本從安風雨依時五穀豐熟花果茂盛到念三十五佛而為上首及與佛剎該黑城本的圖版至今尚未發表因此無從與此次從寧夏方塔出土的文獻比較但根據上述著録黑城本與方塔本版式行款字體風格均一致則兩本似由同一版片所印黑城本存文相當於方塔本的第行第行不過孟列夫著録黑城本為經折裝而據我所見方塔本的照片方塔本似為卷軸裝所以兩者的關係到底如何需要比較兩者的圖版以後才能作最後結論由於我沒有看到方塔本的原件或與原件等大的復印件所以在上文中沒有著録該方塔本的大小孟列夫對黑城本的有關著録可為參考待黑城本圖版發表後可據以補足方塔本第行第行殘缺的文字本文獻是西夏方塔出土的這批佛教文獻中唯一帶有明確年號的文獻為這批文獻斷代提供了明確的依據七吉祥上樂輪等虛空本續寫本因未能考察原件故裝幀形式不清從復印件看有可能是縫繢裝待考現存殘片大小不等近塊這些殘片有些可以綴接有些可以排出次序但目前尚無法完全釐定其先後次序故在此不一一著録值得慶幸的是雖然該文獻殘損已極但原文獻的首部與尾部均有文字殘留故可考知其經名及傳譯者等項關於經名本文獻首紙之首行文字作空本續應為殘存之首題尾部末行文字作樂輪等虛空本續見應為殘存之尾題此外本文獻歸敬偈之後正文起首即稱吉祥上樂輪略文等虛空本續之義者因道果三也首紙第第行且在殘文中又有然釋此本續大分為三初對辨題名者梵云此云吉祥上樂輪也等虛空也本續也等語由此可知該文獻名題中必有吉祥上樂輪等虛空本續等詞佛教文獻之首題尾題內題經常互有參差且經常衍生許多異名而某文獻通行的正式名稱則往往由使用者從上述多種名稱中按照約定俗成的規則確定因此斟酌上述情況將該文獻的名稱定為吉祥上樂輪等虛空本續當無大差本文獻首紙之第第兩行如下國師知金剛傳沙門提點海照譯國師是西夏對僧人的封號西夏前期國師是僧人的最高封號根據西夏官階封號表國師為上品等位其地位在諸王位與中書位樞密位之間根據天盛舊改新定律令國師地位與中書樞密位相等西夏晚期從仁宗朝起另設帝師地位高於國師本文獻應是仁宗朝譯出的但到底何時譯出當時是否已經開始封帝師尚需研究史金波先生綜合各種資料在所撰西夏佛教史略中羅列了當時已知的十三個國師的名稱同上書第頁其中無知金剛其人本文獻的發現進一步豐富了我們對西夏國師及西夏佛教的知識從首紙第行可知吉祥上樂輪等虛空本續是由知金剛傳授的將該文獻翻譯為漢文的則是他人再從知金剛這個名字本身可知一知金剛具備阿闍梨上師的身份具備傳授密法的資格從吉祥上樂輪等虛空本續看所傳授者為講究空樂雙運的無上瑜伽派密法所以知金剛應該是一個無上瑜伽派的密教高僧二知金剛不是漢族僧人大約不通漢語很可能是藏族僧人提點本為俗官名稱沙門提點則顯然是借用俗官名稱的一種僧職根據史金波西夏佛教史略仁宗時設有偏袒都大提點負責掌管全國佛教事務則可知所謂沙門提點是地位較低的一種僧官海照本文獻的譯者詳情無考應是一個兼通藏漢語文顯密教義的漢族僧人希望將來能夠發現更多有關他的資料佛典漢譯的情況比較復雜有些翻譯者本人兼通中外兩種語言文字如真諦玄奘義淨等翻譯時由外譯中的任務是由他們自己承擔的因此他們是名副其實的譯者也有些外來的僧人並不懂漢語文但由於所譯經典是由他們帶來的或由於只有他們才懂得與能夠講解這部佛典又由於過去的譯場除了翻譯佛典外還承擔著講解佛典的任務因此這些外來的僧人即成為這個譯場的核心稱為譯主如華嚴經的翻譯者實叉難陀即是如此由於這個譯主不懂得漢文所以外譯中的任務實際是由譯場中的度語筆受等諸色人等完成的儘管如此將來經典譯出後這個外來的譯主將成為正式的翻譯者列名在前諸經録記載時也把該佛典的翻譯看作是譯主的勞作基本不提其他諸色人等這成為中國佛教譯場的一個傳統從南北朝到宋沿襲不廢本世紀以來一些研究者力圖從辭彙風格等來研究佛典的翻譯鑒別失譯經典的譯者乃至判別一些譯者有爭議的譯本的真正譯者近年來電腦的普及更給這些研究者提供了得心應手的研究工具但是由於我國古代的佛典翻譯大抵是集體勞動的成果存在著上述種種復雜情況便為上述研究者的工作帶來許多難題因如果不理清某佛典真正的翻譯者綴文者修飾者則上述研究所得出的成果只能是建立在沙灘上的大廈就目前我所掌握的資料而言西夏方塔出土的吉祥上樂輪等虛空本續明確區別佛典的傳授者與翻譯者這在中國佛教翻譯史上尚屬首創其意義是值得充分肯定的本文獻雖然殘損較甚但大意仍可明瞭從結構上講科分為三初對辨名題次譯家歸敬後解釋本文從內容上講係從因道果三個方面論述吉祥上樂輪等虛空本續既敘述無上瑜伽派的理論也涉及該派的宗教修持就理論而言文中強調必須如是了知身心本來是佛自性是如熟習而了達則方始成佛若不爾者猶如磨炭終不作白縱爾修煉不能成佛即論述了密教即身成佛的基本觀點同時又論述了無上瑜伽派的宗教修持的基本依據氣脈明點理論主張夫胎生之類身脈位有七萬二千總綰束成於四輪百二十脈又束俱是二十四宮又復歸聚依附根本三脈而住也入依六輪敘述了六輪的基本情況即頂部的大樂輪額部的風輪喉部的報輪胸部的法輪臍部的化輪下陰部輪名殘缺等就宗教修持而言簡要論述了無上瑜伽派空樂雙運的具體過程包括傳授密法的條件如何向上師奉獻明妃以求灌頂空樂雙運的具體方法等等本文獻僅存於西夏漢文佛典中不為我國歷代大藏經所收前此亦不為人們所知根據目前掌握的材料在黑城出土的西夏漢文佛典中也未見存在具有很高的研究價值唯原文殘破過甚次序淩亂故目前首先需要根據原件進行認真的比對綴合將諸殘片的次序全部排定八修持儀軌擬寫本單面抄寫之縫繢裝每紙釐米包括左右兩個半葉每半葉行行約至字不等兩半葉中縫留空每紙四周有單框但兩半葉之天地框線互不連貫有些框線位置上下參差顯係將諸紙縫繢後所劃無界欄現存共紙其中等紙為整張均包括左右兩個半葉紙為半張僅剩右半葉諸紙殘破程度不一大體完好根據牛達生先生考訂及所提供的原件復印件分析等紙原為該縫繢裝的一個單元下稱第一單元其中與與互為配紙為外紙相配的裏紙已佚等紙為一個單元下稱第二單元其中為裏紙與右半葉相配的外紙已佚與左半葉相配的乃紙的右半葉與與互為配紙為外紙相配的裏紙已佚上述兩個單元尚不能直接綴接紙為另一個單元的單張其右半葉與第二單元紙的左半葉互為配紙紙為單張僅剩右半葉在上文衆經要集擬的敘録中我曾經研究分析了單面抄縫繢裝形成的兩種方法從上述介紹可知修持儀軌擬係採用第二種方法做成本文獻應屬無上瑜伽派論述壇場布置本尊及修持法等諸種儀軌故暫擬此名第一單元紙個半葉殘文首部按照無上瑜伽派一體平等無二即是真實理的思想將吉祥形嚕割的眼耳鼻口舌觸身等五根與癡嗔妒欲慳等相配認為癡等五惡實際均為金剛進而認為一切根上自在金剛將地水火風空等五大視作令墮母殺害母能標母舞自在母蓮花鬘母等女神從而就五蘊五根五界觀想諸佛之清淨以體認即身成佛之理以下觀想金剛悵念誦豎橛咒釘橛咒觀顯上師究竟正覺歸依三寶觀想空性觀想修持本尊法觀想修持意輪語輪身輪等以下殘缺第一單元不少漢字音譯詞下注有梵文原文第二單元紙個半葉殘文首部仍論述觀想修持意語身三輪稱之為三字之自性由此可知第二單元應接續在第一單元之後兩個單元之間殘缺文字不多以下解説二甲胄及二甲胄心中咒敘述六堅甲及與其相配的明妃出有壞母心咒供養咒等最後一段論述勇猛修持密法者人體器官的象徵意義諸如膽是具鬘金剛胞是大怖畏等等紙的右半葉上接第二單元繼續論述勇猛人體器官的象徵意義謂痰是大力膿是金剛寶等等由人體器官的這些象徵意義論證人體本身清淨無染紙接著對諸修持要點作全面的簡要總結諸如勇猛根本神咒者即是梵線而觀察勇猛六種甲胄者於此手印莊嚴身金剛亥母神咒者項上瓔珞而莊嚴等等紙左右兩半葉文字連貫從這一點看它應該是某一單元的芯紙的裏紙但由於它的右半葉與第二單元紙的左半葉互為配紙則它又應該是與第二單元相綴連的下一單元最後一張夾紙的外紙兩者相互矛盾因此或者上述第一單元第二單元的復原尚有疑點需要進一步研究或者目前的紙實際上並不是一張完整的單紙而是由兩個半葉綴接而成也就是説紙的左右兩個半葉本來並非一張紙而是由於另外一些原因被綴接在一起由於我所見到的是復印件沒有能夠考察原件因此對於上述問題目前無法得出傾向性的結論紙為某紙之右半葉所書為偈頌從內容看似與紙的左半葉相連綴本文獻屬西夏晚期從藏文翻譯的密教無上瑜伽派典籍僅在西夏流傳前此未為中原人士所知故古代佛教文獻中未有記録亦不為我國歷代大藏經所收現雖僅餘紙半但保存尚完好保留研究資訊亦較多如與藏文佛典比勘覓得其原本將能進一步推進對本文獻乃至對西夏佛教我國古代書籍裝幀史的研究九殘密教文獻刻本經折裝現殘斷為個殘片大小不等因無一整紙故每紙折為幾個半葉不清每半葉六行約釐米因無一整行故每行幾字亦不清根據諸紙殘行分析大約每行字上下單邊個殘片中部分殘片上下語意連貫應屬同紙其中最大一塊殘片第二三行之間有一小字加行謂以下初輪功德十二偈此外還有小字三處是否行間加行不清內容分別是此下十四頌出現三十七故即是出現寶生佛第一者義成就中即再考察諸殘片的內容諸如大供養者是大欲大供養者即大嗔大供養者是大癡大供養者即大忿等等可以肯定本文獻為西夏翻譯的密教經典本文獻未為我國歷代經録所記載也不為歷代大藏經所收為西夏佛教研究提供了新資料但由於殘破較甚需要進一步綴殘方能展開更深入的研究十殘疏刻本裝幀形態不清似為蝶裝或縫繢裝殘存一個半葉行餘字天地均殘右邊為子母線左邊單框有版心所疏經文作陰文有外框線疏文作陽文無界欄引用經文只引每個段落的首字及尾字現存見至蔞僧至城線至輝三段本文獻似未為我國歷代經録所著録亦未為歷代大藏經所收詳情待考十一殘佛經刻本裝幀形式不清殘存三行文字為善及善男女人歸依佛法僧所獲福分不及一千分不及一萬應為某佛經之殘片詳情待考
